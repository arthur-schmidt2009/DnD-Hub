<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DND Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
    <h1>DND HUB</h1>

    <input id="nameInput" placeholder="Dein Name">

    <button onclick="login()">Enter Game</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

    <h1>DND HUB</h1>

    <p id="welcome"></p>

    <div class="dice-buttons">
        <button onclick="rollDice(4)">D4</button>
        <button onclick="rollDice(6)">D6</button>
        <button onclick="rollDice(8)">D8</button>
        <button onclick="rollDice(10)">D10</button>
        <button onclick="rollDice(12)">D12</button>
        <button onclick="rollDice(20)">D20</button>
        <button onclick="rollDice(100)">D100</button>
    </div>

    <h2>Dice Feed</h2>
    <div id="feed"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
