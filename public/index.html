<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DND HUB</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ---------------- LOGIN / REGISTER ---------------- -->
<div id="auth">

    <h1>🎲 DND HUB</h1>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <br><br>

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

</div>

<!-- ---------------- MAIN APP ---------------- -->
<div id="app" style="display:none;">

    <h1>🎲 DND HUB</h1>

    <p id="welcome"></p>

    <hr>

    <!-- CHARACTER SYSTEM -->
    <h2>🧙 Character erstellen</h2>

    <input id="charName" placeholder="Name">
    <input id="charClass" placeholder="Class">
    <input id="charRace" placeholder="Race">
    <input id="charHP" placeholder="HP">
    <input id="charAC" placeholder="AC">

    <br><br>

    <button onclick="createCharacter()">Character speichern</button>

    <hr>

    <h2>🎲 Dice Roller</h2>

    <button onclick="rollDice(2)">D2</button>
    <button onclick="rollDice(4)">D4</button>
    <button onclick="rollDice(6)">D6</button>
    <button onclick="rollDice(8)">D8</button>
    <button onclick="rollDice(10)">D10</button>
    <button onclick="rollDice(12)">D12</button>
    <button onclick="rollDice(20)">D20</button>
    <button onclick="rollDice(100)">D100</button>

    <hr>

    <h2>📜 Live Feed</h2>
    <div id="feed"></div>

</div>

<!-- SOCKET.IO -->
<script src="/socket.io/socket.io.js"></script>

<!-- SCRIPT -->
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
